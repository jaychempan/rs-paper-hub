name: Daily Paper Update

on:
  schedule:
    # Run Mon-Fri at 00:30 UTC (08:30 Beijing Time), 30min after arXiv announcements
    # arXiv publishes new papers Sun-Thu at 20:00 EDT (00:00 UTC next day)
    # No arXiv announcements on Fri/Sat, so skip weekends
    - cron: '30 0 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update papers (last 7 days)
        run: python main.py --update

      - name: Run pipeline (clean + filter + classify)
        run: python pipeline.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet output/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          PAPER_COUNT=$(python -c "import json; print(len(json.load(open('output/papers.json'))))")
          VLM_COUNT=$(python -c "import json; print(len(json.load(open('output/papers_vlm.json'))))")
          AGENT_COUNT=$(python -c "import json; print(len(json.load(open('output/papers_agent.json'))))")
          UAV_COUNT=$(python -c "import json; print(len(json.load(open('output/papers_uav.json'))))")
          git commit -m "chore: daily update ${PAPER_COUNT} papers (${VLM_COUNT} VLM, ${AGENT_COUNT} Agent, ${UAV_COUNT} UAV)

          Updated: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
